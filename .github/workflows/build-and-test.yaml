name: Build and Test

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK:
        description: 'Slack Notifier Webhook'
        required: true
      NEW_HELIX_KEY:
        description: 'Helix Agent API Key'
        required: true
jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    env:
      XCODE_VERSION: ${{ vars.XCODE_VERSION }}
      SIM_DEVICE_NAME: ${{ vars.SIM_DEVICE_NAME }}
      SIM_OS_VERSION: ${{ vars.SIM_OS_VERSION }}

    steps:
      # Step: Parse static Helix agent response string and echo each value
      - name: Parse static Helix agent response example
        shell: bash
        run: |
          static_response='{"message_class":"complete","conversation_id":"b1257b9e-367a-41be-9e6a-4e7ce8243eb5","message_id":"3928cd58-a86f-46fe-a5ba-985bbf963b0a","channel_id":"01dd5295-4c15-4cae-9654-49175dd2b561","content":[{"class":"complete","date_time":"2025-07-10T16:09:41.354087769Z","field_id":"endNode","field_label":"task0ef9ac5c8a58","type":"text","value":"```json\n{\n  \"shortAnalysis\": \"The build failed due to multiple test failures. Changes in `CookieModule.swift` that clear in-memory cookies prematurely are the likely cause, and these failures were exposed by re-enabling previously disabled tests in the test plan.\",\n  \"failureCausedByChanges\": true,\n  \"affectedFiles\": [\n    {\n      \"file\": \"Orchestrate/Orchestrate/CookieModule.swift\",\n      \"lines\": \"83, 108\",\n      \"comment\": \"The addition of `await storage?.deleteCookies(url: url)` at the beginning of the `inject` and `handle` methods is the likely cause of the `CookieModuleTests` failure. This new logic clears cookies from storage before the test can validate their state.\"\n    },\n    {\n      \"file\": \"PingTestHost/PingTestHost.xctestplan\",\n      \"lines\": \"24-78\",\n      \"comment\": \"Several test suites, including ones that are now failing, were re-enabled in the test plan. This change exposed the breaking code modifications in `CookieModule.swift`.\"\n    }\n  ]\n}\n```"}]}'
          # Only decode the embedded JSON in the content[0]['value'] field
          value_field=$(echo "$static_response" | python3 -c "import sys, json; obj=json.load(sys.stdin); print(obj['content'][0]['value'])")
          # Remove code block markers and leading/trailing whitespace
          cleaned=$(echo "$value_field" | sed 's/^```json\\n//' | sed 's/\\n```$//')
          cleaned=$(echo "$cleaned" | awk '{$1=$1};1')
          # Parse and echo only the embedded JSON keys and values
          echo "Embedded JSON keys and values (from content[0]['value']):"
          python3 -c "import sys, json;\n s = sys.stdin.read()\n try:\n    obj = json.loads(s)\n    for k, v in obj.items():\n        print(f'{k}: {v}')\n except Exception as e:\n    print('Embedded JSON decode error:', e)\n    print('Raw embedded JSON:')\n    print(s)" <<< "$cleaned"
      # Create Helix conversation
      - name: Create Helix conversation
        id: create_helix
        env:
          HELIX_BASE_API_URL: 'https://openam-helix.forgeblocks.com/dpc/jas/helix/v1'
          HELIX_ENV_ID: '106af4c5-6b44-46e4-9858-037c1a9d9f7c'
          HELIX_AGENT_ID: 'buildFailureAgent'
          HELIX_DEFAULT_AGENT_VERSION: 'draft'
          API_KEY: ${{ secrets.NEW_HELIX_KEY }}
        run: |
          echo "API_KEY length: ${#API_KEY}"
          echo "HELIX_BASE_API_URL: $HELIX_BASE_API_URL"
          echo "HELIX_ENV_ID: $HELIX_ENV_ID"
          echo "HELIX_AGENT_ID: $HELIX_AGENT_ID"
          echo "HELIX_DEFAULT_AGENT_VERSION: $HELIX_DEFAULT_AGENT_VERSION"
          create_resp=$(curl -s -w "\n%{http_code}" -X POST "$HELIX_BASE_API_URL/environments/$HELIX_ENV_ID/agents/$HELIX_AGENT_ID/conversations" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "{\"agent\":{\"version\":\"$HELIX_DEFAULT_AGENT_VERSION\"}}")
          http_body=$(echo "$create_resp" | sed '$d')
          http_code=$(echo "$create_resp" | tail -n1)
          echo "Helix agent create conversation HTTP status: $http_code"
          echo "Helix agent create conversation response body:"
          echo "$http_body"
          conversation_id=$(echo "$http_body" | jq -r '.id // empty')
          channel_id=$(echo "$http_body" | jq -r '.home_channel // empty')
          if [ "$http_code" -ne 200 ] || [ -z "$conversation_id" ] || [ -z "$channel_id" ]; then
            echo "Helix agent conversation creation failed."
            exit 1
          fi
          echo "CONVERSATION_ID=$conversation_id" >> $GITHUB_ENV
          echo "CHANNEL_ID=$channel_id" >> $GITHUB_ENV

      # Clone the repo
      - name: Clone the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 0

      # Get the architecture of the chip
      - name: Check chip architecture 
        run: echo "CHIP_TYPE=$(uname -m)" >> $GITHUB_ENV    

      # Set target Xcode version. For more details and options see:
      # https://github.com/actions/virtual-environments/blob/main/images/macos/macos-15-Readme.md
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_$XCODE_VERSION.app && /usr/bin/xcodebuild -version
        
      # Run all tests
      - name: Run tests
        id: test_step
        run: |
          DEST="platform=iOS Simulator,name=${SIM_DEVICE_NAME},OS=${SIM_OS_VERSION}"
          echo "Running tests on $DEST"

          # Capture test output to a file
          mkdir -p test-output
          xcodebuild test \
          -scheme PingTestHost \
          -workspace SampleApps/Ping.xcworkspace \
          -configuration Debug \
          -destination "$DEST" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath TestResults 2>&1 | tee test-output/xcodebuild.log | xcpretty
          
          exit ${PIPESTATUS[0]}

      # Read test output if tests failed
      - name: Process test output
        if: failure()
        id: process_logs
        run: |
          if [ -f test-output/xcodebuild.log ]; then
            # Get last 100 lines of log file to avoid message size limits
            tail -n 100 test-output/xcodebuild.log > test-output/failure.log
            {
              echo 'failure_logs<<EOF'
              cat test-output/failure.log
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi

      # Send error logs to Helix agent
      - name: Send error logs to Helix agent
        if: failure()
        id: helix_agent
        env:
          HELIX_BASE_API_URL: 'https://openam-helix.forgeblocks.com/dpc/jas/helix/v1'
          HELIX_ENV_ID: '106af4c5-6b44-46e4-9858-037c1a9d9f7c'
          HELIX_AGENT_ID: 'buildFailureAgent'
          HELIX_DEFAULT_AGENT_VERSION: 'draft'
          HELIX_AGENT_DIFF_INPUT: 'textInputDiff'
          HELIX_AGENT_LOGS_INPUT: 'textInputLogs'
          HELIX_AGENT_STAGE_INPUT: 'textInputStageName'
          API_KEY: ${{ secrets.NEW_HELIX_KEY }}
          CONVERSATION_ID: ${{ env.CONVERSATION_ID }}
          CHANNEL_ID: ${{ env.CHANNEL_ID }}
        run: |
          # Prepare inputs
          git fetch --all --prune
          code_diff=$(git diff origin/develop...HEAD)
          echo "CODE_DIFF:"
          echo "$code_diff"
          failure_logs=$(cat test-output/failure.log)
          echo "FAILURE_LOGS:"
          echo "$failure_logs"
          stage_name="Run tests"

          # Construct message
          msg_body=$(jq -n --arg diff "$code_diff" --arg logs "$failure_logs" --arg stage "$stage_name" \
            '{class:"start",content:{($ENV.HELIX_AGENT_DIFF_INPUT):$diff,($ENV.HELIX_AGENT_LOGS_INPUT):$logs,($ENV.HELIX_AGENT_STAGE_INPUT):$stage}}')

          # Post message and capture response
          agent_response=$(curl -s -X POST "$HELIX_BASE_API_URL/environments/$HELIX_ENV_ID/conversations/$CONVERSATION_ID/channels/$CHANNEL_ID/messages" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d "$msg_body")
          {
            echo 'helix_agent_response<<EOF'
            echo "$agent_response"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # Parse Helix agent response for Slack
      - name: Parse Helix agent response
        if: failure()
        id: parse_helix
        shell: bash
        run: |
          # Use the full Helix agent response for parsing, skipping value_field
          echo "BuildFailureAgent: Processing response: ${{ steps.helix_agent.outputs.helix_agent_response }}"
          # Remove leading/trailing code block markers and replace literal \n with newlines
          cleaned=$(echo "${{ steps.helix_agent.outputs.helix_agent_response }}" | sed 's/^```json\\n//' | sed 's/\\n```$//')
          unescaped=$(printf "%b" "$cleaned")
          # Extract short_analysis and affected_files using regex
          # Use Perl for robust multiline and special character extraction, escaping parentheses
          short_analysis=$(echo "$unescaped" | perl -0777 -ne 'print $1 if /"shortAnalysis"\s*:\s*"((?:[^"\\]|\\.)*)"/s')
          affected_files=$(echo "$unescaped" | perl -0777 -ne 'print $1 if /"affectedFiles"\s*:\s*(\[[^\]]*\])/s')
          # Escape parentheses for downstream use
          short_analysis_escaped=$(echo "$short_analysis" | sed 's/(/\\(/g; s/)/\\)/g')
          affected_files_escaped=$(echo "$affected_files" | sed 's/(/\\(/g; s/)/\\)/g')
          echo "short_analysis=$short_analysis_escaped" >> $GITHUB_ENV
          echo "affected_files=$affected_files_escaped" >> $GITHUB_ENV

      # Publish test results
      - name: Publish test results
        uses: slidoapp/xcresulttool@v3.1.0
        with:
          title: "Test Results ${{ matrix.os }} | Helix: ${{ steps.helix_agent.outputs.helix_agent_response }}"
          path: TestResults.xcresult
          show-passed-tests: false
          upload-bundles: never
        if: success() || failure()
 
      # Send slack notification with result status
      - uses: 8398a7/action-slack@v3
        with:
          mention: 'george.bafaloukas'
          if_mention: 'failure,cancelled'
          fields: repo,author,eventName,message,job,pullRequest,took
          status: ${{ job.status }}
          text: |
            ${{
              job.status == 'failure'
              && format(
                '*Test Failure Logs:*\n```\n{0}\n```\n*Helix Agent Response (raw):*\n```json\n{1}\n```\n*Helix Analysis:*\n*Short Analysis:*\n*{2}*\n*Affected Files:*\n*{3}*',
                steps.process_logs.outputs.failure_logs,
                steps.helix_agent.outputs.helix_agent_response,
                steps.parse_helix.outputs.short_analysis,
                steps.parse_helix.outputs.affected_files
              )
              || ''
            }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

      # Comment on PR with Helix analysis result
      - name: Comment on PR with Helix analysis
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SHORT_ANALYSIS: ${{ steps.parse_helix.outputs.short_analysis }}
          AFFECTED_FILES: ${{ steps.parse_helix.outputs.affected_files }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const shortAnalysis = process.env.SHORT_ANALYSIS || 'N/A';
            const affectedFiles = process.env.AFFECTED_FILES || 'N/A';
            const analysis = `### Helix Build/Test Failure Analysis\n\n**Short Analysis:**\n${shortAnalysis}\n\n**Affected Files:**\n${affectedFiles}`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: analysis
            });
